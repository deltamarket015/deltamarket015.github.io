<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Delta X Studio | Premium Workspace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & HIGH-CONTRAST GLASS THEME
           ========================================================================== */
        :root {
            --bg-base: #030005; 
            --bg-panel: rgba(15, 10, 25, 0.45); 
            --bg-panel-hover: rgba(255, 255, 255, 0.08);
            --bg-input: rgba(0, 0, 0, 0.6); 
            
            --text-main: #ffffff;
            --text-muted: #cbd5e1; 
            
            --accent-primary: #ff007f;
            --accent-hover: #ff3399;
            --accent-glow: rgba(255, 0, 127, 0.5); 
            
            --border-color: rgba(255, 255, 255, 0.15); 
            --border-focus: rgba(255, 0, 127, 0.8);
            
            --success: #10b981;
            --error: #ef4444;

            --glass-blur: blur(8px);
            --shadow-md: 0 4px 15px rgba(0,0,0,0.5);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.8);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --radius-full: 9999px;

            --font-family: 'Poppins', sans-serif;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);

            --navbar-height: 60px;
            --sidebar-width: 280px;
            --bottom-nav-height: 65px;
        }

        /* ==========================================================================
           2. RESET & BASE STYLES (MOBILE OPTIMIZED)
           ========================================================================== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100dvh; 
            width: 100%; 
            overflow: hidden; 
            overscroll-behavior: none;
            font-family: var(--font-family); background-color: var(--bg-base); color: var(--text-main); 
        }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: var(--radius-full); }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

        h1, h2, h3, h4 { font-weight: 600; }
        button, input, textarea, select { font-family: inherit; border: none; background: none; outline: none; }
        button { cursor: pointer; }

        /* BULLETPROOF ICON FIX */
        svg { 
            width: 20px; height: 20px; 
            fill: none !important; 
            stroke: currentColor !important; 
            stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; 
        }

        .glass-panel {
            background: var(--bg-panel) !important; backdrop-filter: var(--glass-blur) !important;
            -webkit-backdrop-filter: var(--glass-blur) !important; border: 1px solid var(--border-color) !important;
            box-shadow: var(--shadow-md) !important;
        }

        /* ==========================================================================
           3. FAST PREMIUM ENTRANCE ANIMATION (PRELOADER)
           ========================================================================== */
        #premium-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.4s ease-in-out, visibility 0.4s ease-in-out;
        }
        .loader-brand {
            font-size: 2rem; font-weight: 700; color: #fff; letter-spacing: 2px; text-transform: uppercase;
            background: linear-gradient(135deg, #fff, var(--accent-primary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: pulseGlow 1s infinite alternate; text-align: center;
        }
        .loader-line {
            width: 0; height: 2px; background: var(--accent-primary); margin-top: 10px;
            box-shadow: 0 0 15px var(--accent-primary);
            animation: drawLine 0.4s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        @keyframes drawLine { 0% { width: 0; opacity: 0; } 50% { opacity: 1; } 100% { width: 150px; opacity: 1; } }
        @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 5px rgba(255,0,127,0.2)); } 100% { filter: drop-shadow(0 0 25px rgba(255,0,127,0.7)); } }
        .fade-out-loader { opacity: 0; visibility: hidden; }

        .app-layout { opacity: 0; animation: appReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.3s forwards; }
        @keyframes appReveal { 0% { opacity: 0; transform: scale(0.97); } 100% { opacity: 1; transform: scale(1); } }
        .slide-up-element { opacity: 0; transform: translateY(20px); animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .delay-1 { animation-delay: 0.4s; } .delay-2 { animation-delay: 0.5s; } .delay-3 { animation-delay: 0.6s; }
        @keyframes slideUpFade { to { opacity: 1; transform: translateY(0); } }

        /* ==========================================================================
           4. LAYOUT ARCHITECTURE
           ========================================================================== */
        .app-layout { display: flex; flex-direction: column; height: 100dvh; width: 100%; position: relative; z-index: 10; background: transparent !important; }
        
        .top-navbar { height: var(--navbar-height); width: 100%; padding: 0 20px; z-index: 50; display: flex; align-items: center; justify-content: space-between; }
        .brand { display: flex; align-items: center; gap: 10px; font-size: 1.2rem; font-weight: 700; color: #fff; text-shadow: 0 0 15px var(--accent-glow); }
        .brand-icon { width: 24px; height: 24px; color: var(--accent-primary); filter: drop-shadow(0 0 8px var(--accent-primary)); }

        .workspace-container { display: flex; flex: 1; height: calc(100dvh - var(--navbar-height)); overflow: hidden; position: relative; background: transparent !important; }

        .sidebar { position: absolute; left: -100%; top: 0; height: 100%; width: 100%; max-width: 320px; z-index: 80; display: flex; flex-direction: column; transition: left var(--transition-smooth); border-right: 1px solid var(--border-color); background: rgba(5,0,10,0.98); backdrop-filter: blur(20px); }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 16px 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .sidebar-footer { padding: 16px; border-top: 1px solid var(--border-color); }
        
        .history-group-title { font-size: 0.75rem; text-transform: uppercase; color: var(--accent-primary); margin-bottom: 6px; font-weight: 700; letter-spacing: 0.05em; }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { display: flex; gap: 12px; padding: 8px; border-radius: var(--radius-md); cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); background: var(--bg-input); }
        .history-item:hover { background: rgba(255,255,255,0.1); border-color: var(--accent-primary); }
        .history-thumb { width: 44px; height: 44px; border-radius: var(--radius-sm); object-fit: cover; border: 1px solid rgba(255,255,255,0.2); }
        .history-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .history-prompt { font-size: 0.85rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
        .history-meta { font-size: 0.7rem; color: var(--text-muted); display: flex; justify-content: space-between; margin-top: 2px; }

        .main-content { flex: 1; display: flex; flex-direction: column; height: 100%; position: relative; width: 100%; background: transparent !important; }
        
        .control-panel { height: 100%; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--bottom-nav-height) + 20px); display: flex; flex-direction: column; gap: 20px; width: 100%; -webkit-overflow-scrolling: touch; }
        .artboard-panel { height: 100%; overflow-y: auto; padding: 16px; padding-bottom: calc(var(--bottom-nav-height) + 20px); display: flex; flex-direction: column; background: transparent !important; position: relative; width: 100%; display: none; -webkit-overflow-scrolling: touch; }

        /* ==========================================================================
           5. UI COMPONENTS
           ========================================================================== */
        .section-title { font-size: 0.9rem; font-weight: 600; color: #fff; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
        .section-title svg { color: var(--accent-primary); width: 18px; height: 18px; filter: drop-shadow(0 0 5px var(--accent-glow)); }

        .prompt-box { position: relative; background: var(--bg-input); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-lg); padding: 12px; transition: 0.2s; backdrop-filter: blur(8px); }
        .prompt-box:focus-within { border-color: var(--accent-primary); box-shadow: 0 0 20px var(--accent-glow); }
        .prompt-textarea { width: 100%; min-height: 70px; resize: none; font-size: 0.95rem; line-height: 1.5; color: #fff; font-weight: 500;}
        .prompt-textarea::placeholder { color: rgba(255,255,255,0.4); font-weight: 400; }
        .prompt-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.15); }
        .char-counter { font-size: 0.75rem; font-weight: 500; color: #ffffff; opacity: 0.7; }
        .prompt-tools { display: flex; gap: 8px; }
        
        .tool-btn { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; color: #ffffff; padding: 6px 12px; border-radius: var(--radius-full); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); transition: 0.2s; }
        .tool-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: 0 0 10px var(--accent-glow); }
        .tool-btn svg { width: 14px; height: 14px; stroke: #ffffff !important; }

        .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 10px; }
        .style-card { position: relative; border-radius: var(--radius-md); overflow: hidden; cursor: pointer; border: 2px solid rgba(255,255,255,0.2); transition: 0.2s; aspect-ratio: 1; background: var(--bg-input); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; }
        .style-card img { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; opacity: 0.4; transition: 0.3s; filter: grayscale(30%); }
        .style-card .overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 6px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 2; text-align: center; font-size: 0.75rem; font-weight: 600; color: #fff; }
        .style-card.active { border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }
        .style-card.active img { opacity: 1; filter: grayscale(0%); }

        .ar-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .ar-card { background: var(--bg-input); border: 1px solid rgba(255,255,255,0.25); backdrop-filter: blur(8px); border-radius: var(--radius-md); padding: 10px 4px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; }
        .ar-card.active { border-color: var(--accent-primary); background: rgba(255, 0, 127, 0.15); box-shadow: 0 0 10px var(--accent-glow); }
        .ar-icon { border: 2px solid #ffffff; border-radius: 4px; opacity: 0.9; } 
        .ar-label { font-size: 0.7rem; font-weight: 600; color: #ffffff; } 
        .ar-card.active .ar-label { color: var(--accent-primary); text-shadow: 0 0 5px var(--accent-glow); }
        .ar-card.active .ar-icon { border-color: var(--accent-primary); box-shadow: 0 0 5px var(--accent-glow); }
        .ar-1-1 { width: 20px; height: 20px; } .ar-16-9 { width: 24px; height: 14px; } .ar-9-16 { width: 14px; height: 24px; } .ar-4-3 { width: 22px; height: 16px; } .ar-3-4 { width: 16px; height: 22px; }

        .btn-generate { width: 100%; padding: 16px; border-radius: var(--radius-lg); background: linear-gradient(135deg, rgba(255,0,127,0.9), rgba(153,0,77,0.9)); backdrop-filter: blur(10px); color: #fff; font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px var(--accent-glow); transition: 0.3s; position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(80%); box-shadow: none; }

        /* ==========================================================================
           ARTBOARD & ADVANCED ASPECT RATIO CROPPING
           ========================================================================== */
        .artboard-wrapper { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            border-radius: var(--radius-lg); position: relative; overflow: hidden; 
            min-height: 50vh; border: 1px solid rgba(255,255,255,0.15); background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); 
        }
        .empty-state { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; padding: 20px; }
        .empty-state svg { width: 48px; height: 48px; color: var(--accent-primary); filter: drop-shadow(0 0 10px var(--accent-glow)); stroke: var(--accent-primary) !important; }
        .empty-state p { color: #ffffff; opacity: 0.7; font-weight: 500; font-size: 0.9rem; }
        
        /* Main Image UI Renderer */
        .image-preview { 
            max-width: 100%; max-height: 100%; 
            object-fit: cover; 
            display: none; border-radius: var(--radius-lg); box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
        }

        .loading-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .loading-overlay.active { opacity: 1; pointer-events: all; }
        .loader-ring { width: 70px; height: 70px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-primary); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; position: relative; box-shadow: 0 0 15px var(--accent-glow); }
        .loader-ring::after { content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px; border: 3px solid rgba(255,255,255,0.1); border-bottom-color: var(--accent-hover); border-radius: 50%; animation: spin-reverse 1.5s linear infinite; }
        .loading-text { font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 12px; text-shadow: 0 2px 10px var(--accent-primary); text-align: center; padding: 0 10px; }
        .progress-bar-container { width: 80%; max-width: 250px; height: 6px; background: rgba(255,255,255,0.2); border-radius: var(--radius-full); overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent-primary), var(--accent-hover)); width: 0%; transition: width 0.3s ease; box-shadow: 0 0 15px var(--accent-glow); }
        .progress-percent { font-size: 0.85rem; font-weight: 600; color: #fff; margin-top: 8px; }

        .image-tools { 
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; 
            margin-top: 16px; padding: 12px; border-radius: var(--radius-lg); 
            opacity: 0; pointer-events: none; transition: 0.3s; transform: translateY(10px); 
            width: 100%; background: var(--bg-panel); border: 1px solid rgba(255,255,255,0.15); 
            backdrop-filter: blur(8px); 
        }
        .image-tools.active { opacity: 1; pointer-events: all; transform: translateY(0); }
        .tool-action-btn { 
            flex: 1; min-width: 30%; display: flex; flex-direction: column; align-items: center; gap: 6px; 
            padding: 8px 10px; border-radius: var(--radius-md); font-size: 0.75rem; font-weight: 600; color: #ffffff; 
            transition: 0.2s; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.25); 
        }
        .tool-action-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: 0 0 10px var(--accent-glow); }
        .filter-select { 
            width: 100%; padding: 10px; border-radius: var(--radius-md); background: rgba(0,0,0,0.8); 
            border: 1px solid rgba(255,255,255,0.3); font-size: 0.85rem; font-weight: 500; color: #fff; 
            cursor: pointer; text-align: center;
        }

        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; height: var(--bottom-nav-height); z-index: 100; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid rgba(255,255,255,0.15); background: rgba(5,0,10,0.98); backdrop-filter: blur(20px); padding-bottom: max(env(safe-area-inset-bottom), 0px); }
        .nav-tab { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; color: #ffffff; opacity: 0.6; flex: 1; height: 100%; transition: 0.2s; }
        .nav-tab.active { color: var(--accent-primary); opacity: 1; }
        .nav-tab span { font-size: 0.65rem; font-weight: 600; }
        .nav-tab svg { width: 22px; height: 22px; stroke: currentColor !important; transition: 0.2s; }
        .nav-tab.active svg { transform: scale(1.1); filter: drop-shadow(0 0 5px var(--accent-primary)); }

        @media (min-width: 900px) {
            .bottom-nav { display: none; }
            .workspace-container { height: calc(100vh - var(--navbar-height)); padding-bottom: 0; }
            .sidebar { position: relative; left: 0; width: 320px; max-width: none; background: transparent; backdrop-filter: none; }
            .main-content { flex-direction: row; }
            .control-panel { width: 420px; flex: none; border-right: 1px solid var(--border-color); padding-bottom: 24px; }
            .artboard-panel { display: flex !important; padding-bottom: 24px; }
            #close-sidebar-mobile { display: none !important; }
            .tool-action-btn { min-width: 80px; flex: none; }
            .filter-select { width: auto; margin-left: auto; text-align: left; }
            .image-tools { flex-wrap: nowrap; justify-content: flex-start; }
        }
        @media (max-width: 899px) { #close-sidebar-mobile { display: flex !important; } }

        /* Lightbox, Toasts & Modals */
        .lightbox-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: 0.3s; }
        .lightbox-overlay.active { opacity: 1; pointer-events: all; }
        .lightbox-content { position: relative; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        /* Notice we removed object-fit cover here because the image is ALREADY cropped when passed to lightbox */
        .lightbox-img { max-width: 95%; max-height: 90%; object-fit: contain; transition: transform 0.2s ease-out; cursor: grab; border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-md); box-shadow: 0 0 30px rgba(0,0,0,0.8); }
        .lightbox-img:active { cursor: grabbing; }
        .lightbox-controls { position: absolute; top: 24px; right: 24px; display: flex; gap: 16px; z-index: 201; }
        .lightbox-btn { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); color: #fff; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.3); transition: 0.2s; }
        .lightbox-btn:hover { background: var(--accent-primary); border-color: var(--accent-primary); box-shadow: 0 0 15px var(--accent-glow); }
        .lightbox-zoom-controls { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: var(--radius-full); backdrop-filter: blur(15px); z-index: 201; border: 1px solid rgba(255,255,255,0.2); }

        .toast-container { position: fixed; top: 20px; right: 50%; transform: translateX(50%); width: 90%; max-width: 400px; z-index: 300; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: rgba(10,2,18,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: var(--radius-md); box-shadow: var(--shadow-lg); display: flex; align-items: flex-start; gap: 12px; width: 100%; transform: translateY(-100%); opacity: 0; transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55); pointer-events: all; position: relative; overflow: hidden; }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast-icon { flex-shrink: 0; width: 24px; height: 24px; }
        .toast-content { flex: 1; }
        .toast-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; color: #fff; }
        .toast-message { font-size: 0.8rem; color: #ffffff; opacity: 0.8; line-height: 1.4; }
        .toast-close { width: 20px; height: 20px; color: #fff; opacity: 0.6; cursor: pointer; }
        .toast-progress { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--text-main); width: 100%; transform-origin: left; }
        .toast.success .toast-icon { color: var(--accent-primary); stroke: var(--accent-primary) !important; }
        .toast.success .toast-progress { background: var(--accent-primary); }
        .toast.error .toast-icon { color: var(--error); stroke: var(--error) !important; }
        .toast.error .toast-progress { background: var(--error); }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 250; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-box { background: rgba(10,5,20,0.95); border: 1px solid rgba(255,255,255,0.2); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 350px; box-shadow: 0 0 40px var(--accent-glow); transform: scale(0.95); transition: 0.2s; backdrop-filter: blur(20px); }
        .modal-overlay.active .modal-box { transform: scale(1); }
        .modal-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 10px; color: #fff; }
        .modal-desc { font-size: 0.85rem; color: #ffffff; opacity: 0.8; margin-bottom: 20px; line-height: 1.5; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 12px; }
        .btn-ghost { padding: 8px 16px; border-radius: var(--radius-md); font-weight: 600; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-danger { padding: 8px 16px; border-radius: var(--radius-md); font-weight: 600; background: var(--error); color: #fff; border: 1px solid transparent; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
    </style>
</head>
<body>

    <div id="premium-loader">
        <div class="loader-brand">Delta X Studio</div>
        <div class="loader-line"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // Fast Preloader
            setTimeout(() => {
                const loader = document.getElementById('premium-loader');
                if(loader) {
                    loader.classList.add('fade-out-loader');
                    setTimeout(() => loader.remove(), 400);
                }
            }, 400);

            // Particles
            if(window.particlesJS) {
                particlesJS("particles-js", {
                    "particles": {
                        "number": { "value": 110, "density": { "enable": true, "value_area": 800 } },
                        "color": { "value": "#ff007f" },
                        "shape": { "type": "circle" },
                        "opacity": { "value": 0.6, "random": true, "anim": { "enable": true, "speed": 1, "opacity_min": 0.2, "sync": false } },
                        "size": { "value": 3, "random": true },
                        "line_linked": { "enable": true, "distance": 160, "color": "#ff007f", "opacity": 0.4, "width": 1.5 },
                        "move": { "enable": true, "speed": 2, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
                    },
                    "interactivity": {
                        "detect_on": "window", 
                        "events": {
                            "onhover": { "enable": true, "mode": ["grab", "bubble"] }, 
                            "onclick": { "enable": true, "mode": "repulse" },
                            "resize": true
                        },
                        "modes": {
                            "grab": { "distance": 200, "line_linked": { "opacity": 0.8 } },
                            "bubble": { "distance": 250, "size": 6, "duration": 2, "opacity": 1, "speed": 3 },
                            "repulse": { "distance": 300, "duration": 0.4 },
                            "push": { "particles_nb": 4 }
                        }
                    },
                    "retina_detect": true
                });
            }
        });

        const API_ENDPOINT = "https://r-gengpt-api.vercel.app/api/image";
        
        const STYLES =[
            { id: "realistic", name: "Realistic", img: "https://images.unsplash.com/photo-1542204165-65bf26472b9b?auto=format&fit=crop&w=150&q=80" },
            { id: "anime", name: "Anime", img: "https://images.unsplash.com/photo-1578632767115-351597cf2477?auto=format&fit=crop&w=150&q=80" },
            { id: "3d", name: "3D Render", img: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&w=150&q=80" },
            { id: "cinematic", name: "Cinematic", img: "https://images.unsplash.com/photo-1485846234645-a62644f84728?auto=format&fit=crop&w=150&q=80" },
            { id: "fantasy", name: "Fantasy", img: "https://images.unsplash.com/photo-1518709268805-4e9042af9f23?auto=format&fit=crop&w=150&q=80" },
            { id: "pixel", name: "Pixel Art", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?auto=format&fit=crop&w=150&q=80" },
            { id: "digital", name: "Digital Paint", img: "https://images.unsplash.com/photo-1579546929518-9e396f3cc809?auto=format&fit=crop&w=150&q=80" },
            { id: "portrait", name: "Portrait", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=150&q=80" }
        ];

        const ASPECT_RATIOS =[
            { id: "1:1", label: "Square", class: "ar-1-1" },
            { id: "16:9", label: "Wide", class: "ar-16-9" },
            { id: "9:16", label: "Story", class: "ar-9-16" },
            { id: "4:3", label: "Standard", class: "ar-4-3" },
            { id: "3:4", label: "Portrait", class: "ar-3-4" }
        ];

        const PROMPTS =[
            "A cyberpunk samurai walking in a neon city, 8k, photorealistic",
            "A cute astronaut cat exploring the red sands of Mars, highly detailed",
            "Epic fantasy castle floating in the sky, waterfalls, glowing clouds",
            "A futuristic racing car speeding through a Tokyo-inspired metropolis"
        ];

        const LOADING_MESSAGES =[
            "Retuning the neural network...", "Painting digital pixels...", "Mixing neural colors...",
            "Processing semantic layers...", "Synthesizing creative vectors...", "Generating masterpiece..."
        ];

        class ToastNotification {
            constructor() { this.container = document.getElementById('toast-container'); }
            show(type, title, message, duration = 3000) {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                let iconSvg = '';
                if(type === 'success') iconSvg = '<svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                else if(type === 'error') iconSvg = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                else if(type === 'warning') iconSvg = '<svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>';
                else iconSvg = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>';

                toast.innerHTML = `<div class="toast-icon">${iconSvg}</div><div class="toast-content"><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div><svg class="toast-close" viewBox="0 0 24 24" onclick="this.parentElement.remove()"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg><div class="toast-progress" style="animation: progress-shrink ${duration}ms linear forwards;"></div>`;
                this.container.appendChild(toast);
                requestAnimationFrame(() => { toast.classList.add('show'); });
                setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 400); }, duration);
            }
        }

        class StorageEngine {
            constructor(key = 'ai_genstudio_history') { this.key = key; this.data = this._load(); }
            _load() { try { const data = localStorage.getItem(this.key); return data ? JSON.parse(data) :[]; } catch (e) { return[]; } }
            _save() { try { localStorage.setItem(this.key, JSON.stringify(this.data)); } catch (e) {} }
            addItem(prompt, style, ar, url) { const item = { id: Date.now().toString(36) + Math.random().toString(36).substr(2), prompt, style, ar, url, timestamp: Date.now() }; this.data.unshift(item); this._save(); return item; }
            getAll() { return this.data; }
            clear() { this.data =[]; this._save(); }
            getGroupedHistory() {
                const groups = { today: [], yesterday: [], older:[] };
                const now = new Date(); const todayStr = now.toDateString();
                const yesterday = new Date(now); yesterday.setDate(now.getDate() - 1); const yesterdayStr = yesterday.toDateString();
                this.data.forEach(item => { const itemDate = new Date(item.timestamp).toDateString(); if (itemDate === todayStr) groups.today.push(item); else if (itemDate === yesterdayStr) groups.yesterday.push(item); else groups.older.push(item); });
                return groups;
            }
        }

        class APIHandler {
            async generate({ prompt, style, ar }) {
                try {
                    let enhancedPrompt = prompt;
                    if(ar !== "1:1") enhancedPrompt += `, ${ar.replace(':', '/')} aspect ratio, perfectly framed`;

                    const query = new URLSearchParams({ prompt: enhancedPrompt, style, ar });
                    const response = await fetch(`${API_ENDPOINT}?${query.toString()}`, { method: 'GET', headers: { 'Accept': 'application/json' } });
                    if (!response.ok) throw new Error(`API Error: ${response.status}`);
                    const json = await response.json();
                    if (json.status === 'success' && json.data && json.data.url) return json.data.url;
                    else throw new Error('Invalid API response');
                } catch (error) { throw error; }
            }
        }

        class ModalManager {
            constructor(confirmCallback) {
                this.overlay = document.getElementById('modal-clear'); this.btnCancel = document.getElementById('modal-cancel');
                this.btnConfirm = document.getElementById('modal-confirm'); this.confirmCallback = confirmCallback;
                this.btnCancel.addEventListener('click', () => this.hide()); this.btnConfirm.addEventListener('click', () => { this.confirmCallback(); this.hide(); });
                this.overlay.addEventListener('click', (e) => { if (e.target === this.overlay) this.hide(); });
            }
            show() { this.overlay.classList.add('active'); }
            hide() { this.overlay.classList.remove('active'); }
        }

        class Lightbox {
            constructor() {
                this.overlay = document.getElementById('lightbox'); this.img = document.getElementById('lightbox-img');
                this.btnClose = document.getElementById('lightbox-close'); this.btnZoomIn = document.getElementById('lightbox-zoom-in');
                this.btnZoomOut = document.getElementById('lightbox-zoom-out'); this.btnReset = document.getElementById('lightbox-zoom-reset');
                this.content = document.getElementById('lightbox-content');
                this.scale = 1; this.panX = 0; this.panY = 0; this.isDragging = false; this.startX = 0; this.startY = 0;
                this.btnClose.addEventListener('click', () => this.close()); this.btnZoomIn.addEventListener('click', () => this.zoom(0.5)); this.btnZoomOut.addEventListener('click', () => this.zoom(-0.5)); this.btnReset.addEventListener('click', () => this.resetTransform());
                this.img.addEventListener('pointerdown', (e) => { if (this.scale > 1) { this.isDragging = true; this.startX = e.clientX - this.panX; this.startY = e.clientY - this.panY; this.img.style.transition = 'none'; } });
                window.addEventListener('pointermove', (e) => { if (!this.isDragging) return; this.panX = e.clientX - this.startX; this.panY = e.clientY - this.startY; this.applyTransform(); });
                window.addEventListener('pointerup', () => { if (this.isDragging) { this.isDragging = false; this.img.style.transition = 'transform 0.2s ease-out'; } });
                this.content.addEventListener('wheel', (e) => { e.preventDefault(); const delta = e.deltaY > 0 ? -0.2 : 0.2; this.zoom(delta); });
            }
            open(src) { this.img.src = src; this.resetTransform(); this.overlay.classList.add('active'); }
            close() { this.overlay.classList.remove('active'); }
            zoom(delta) { this.scale = Math.max(1, Math.min(this.scale + delta, 5)); if (this.scale === 1) { this.panX = 0; this.panY = 0; } this.applyTransform(); }
            resetTransform() { this.scale = 1; this.panX = 0; this.panY = 0; this.applyTransform(); }
            applyTransform() { this.img.style.transform = `translate(${this.panX}px, ${this.panY}px) scale(${this.scale})`; }
        }

        class App {
            constructor() {
                this.toast = new ToastNotification(); this.storage = new StorageEngine(); this.api = new APIHandler();
                this.lightbox = new Lightbox(); this.modal = new ModalManager(() => this.clearHistory());
                this.currentStyle = STYLES[0].id; this.currentAR = ASPECT_RATIOS[0].id; this.currentImageUrl = null; this.isGenerating = false;
                this.ui = {
                    promptInput: document.getElementById('prompt-input'), charCounter: document.getElementById('char-counter'),
                    btnClear: document.getElementById('btn-clear-prompt'), btnSurprise: document.getElementById('btn-surprise'),
                    styleGrid: document.getElementById('style-grid'), arGrid: document.getElementById('ar-grid'), btnGenerate: document.getElementById('btn-generate'),
                    artboardPanel: document.getElementById('artboard-panel'), emptyState: document.getElementById('empty-state'), generatedImage: document.getElementById('generated-image'),
                    loadingOverlay: document.getElementById('loading-overlay'), loadingMsg: document.getElementById('loading-msg'), progressBar: document.getElementById('progress-bar'), progressPercent: document.getElementById('progress-percent'),
                    imageTools: document.getElementById('image-tools'), btnDownload: document.getElementById('btn-download'), btnCopy: document.getElementById('btn-copy'), btnFullscreen: document.getElementById('btn-fullscreen'), filterSelect: document.getElementById('filter-select'),
                    sidebar: document.getElementById('sidebar'), historyContainer: document.getElementById('history-container'), btnClearHistory: document.getElementById('clear-history-btn'), mobileNavTabs: document.querySelectorAll('.nav-tab'),
                    closeSidebarBtn: document.getElementById('close-sidebar-mobile')
                };
                this.init();
            }

            init() { this.renderStyleSelector(); this.renderARSelector(); this.bindEvents(); this.renderHistory(); }

            renderStyleSelector() {
                this.ui.styleGrid.innerHTML = '';
                STYLES.forEach(style => {
                    const card = document.createElement('div'); card.className = `style-card ${this.currentStyle === style.id ? 'active' : ''}`;
                    card.innerHTML = `<img src="${style.img}" alt="${style.name}" loading="lazy"><div class="overlay">${style.name}</div>`;
                    card.addEventListener('click', () => { this.currentStyle = style.id; document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); });
                    this.ui.styleGrid.appendChild(card);
                });
            }

            renderARSelector() {
                this.ui.arGrid.innerHTML = '';
                ASPECT_RATIOS.forEach(ar => {
                    const card = document.createElement('div'); card.className = `ar-card ${this.currentAR === ar.id ? 'active' : ''}`;
                    card.innerHTML = `<div class="ar-icon ${ar.class}"></div><span class="ar-label">${ar.label}</span>`;
                    card.addEventListener('click', () => { this.currentAR = ar.id; document.querySelectorAll('.ar-card').forEach(c => c.classList.remove('active')); card.classList.add('active'); });
                    this.ui.arGrid.appendChild(card);
                });
            }

            bindEvents() {
                this.ui.promptInput.addEventListener('input', (e) => { const val = e.target.value; if(val.length > 500) e.target.value = val.substring(0, 500); this.ui.charCounter.textContent = `${e.target.value.length} / 500`; e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight) + 'px'; });
                this.ui.btnClear.addEventListener('click', () => { this.ui.promptInput.value = ''; this.ui.promptInput.dispatchEvent(new Event('input')); this.ui.promptInput.focus(); });
                this.ui.btnSurprise.addEventListener('click', () => { this.ui.promptInput.value = PROMPTS[Math.floor(Math.random() * PROMPTS.length)]; this.ui.promptInput.dispatchEvent(new Event('input')); });
                this.ui.btnGenerate.addEventListener('click', () => this.handleGenerate());
                
                // FIXED: Expand Button now uses the Canvas Processor
                this.ui.btnFullscreen.addEventListener('click', async () => { 
                    if (this.currentImageUrl) {
                        this.ui.btnFullscreen.style.opacity = '0.5';
                        this.ui.btnFullscreen.style.pointerEvents = 'none';
                        const processedUrl = await this.getProcessedImageURL();
                        this.ui.btnFullscreen.style.opacity = '1';
                        this.ui.btnFullscreen.style.pointerEvents = 'auto';
                        this.lightbox.open(processedUrl); 
                    } 
                });

                this.ui.btnCopy.addEventListener('click', () => { if (this.currentImageUrl) { navigator.clipboard.writeText(this.currentImageUrl).then(() => this.toast.show('success', 'Copied', 'Image URL copied.')).catch(() => this.toast.show('error', 'Error', 'Failed to copy URL.')); } });
                this.ui.btnDownload.addEventListener('click', () => this.downloadGeneratedImage());
                this.ui.filterSelect.addEventListener('change', (e) => this.applyCSSFilter(e.target.value));
                this.ui.btnClearHistory.addEventListener('click', () => this.modal.show());
                
                this.ui.closeSidebarBtn.addEventListener('click', () => {
                    this.ui.sidebar.classList.remove('active');
                });

                this.ui.mobileNavTabs.forEach(tab => { 
                    tab.addEventListener('click', (e) => { 
                        const targetId = tab.getAttribute('data-target'); 
                        if (targetId) this.switchMobileView(targetId); 
                    }); 
                });
            }

            switchMobileView(targetId) {
                if (window.innerWidth >= 900) return;
                
                if (targetId === 'sidebar') { 
                    this.ui.sidebar.classList.add('active'); 
                } else {
                    this.ui.sidebar.classList.remove('active'); 
                    this.ui.mobileNavTabs.forEach(t => t.classList.remove('active')); 
                    const activeTab = document.querySelector(`.nav-tab[data-target="${targetId}"]`); 
                    if(activeTab) activeTab.classList.add('active');
                    
                    if (targetId === 'control-panel') { 
                        document.getElementById('control-panel').style.display = 'flex'; 
                        document.getElementById('artboard-panel').style.display = 'none'; 
                    } else if (targetId === 'artboard-panel') { 
                        document.getElementById('control-panel').style.display = 'none'; 
                        document.getElementById('artboard-panel').style.display = 'flex'; 
                    } 
                }
            }

            async handleGenerate() {
                const prompt = this.ui.promptInput.value.trim();
                if (!prompt) { this.toast.show('warning', 'Missing Prompt', 'Please enter a description for your image.'); this.ui.promptInput.focus(); return; }
                if (this.isGenerating) return;
                
                this.isGenerating = true; 
                this.ui.btnGenerate.disabled = true; 
                this.ui.btnGenerate.innerHTML = `<svg viewBox="0 0 24 24" class="loader-ring" style="width:20px;height:20px;border-width:2px;margin:0;box-shadow:none;"><circle cx="12" cy="12" r="10"></circle></svg> Generating...`;
                
                const artboardTab = document.getElementById('tab-artboard'); 
                if(artboardTab) artboardTab.style.display = 'flex'; 
                this.switchMobileView('artboard-panel');
                
                this.ui.emptyState.style.display = 'none'; 
                this.ui.generatedImage.style.display = 'none'; 
                this.ui.imageTools.classList.remove('active'); 
                this.ui.filterSelect.value = 'none'; 
                this.applyCSSFilter('none');

                const arMap = { "1:1": "1/1", "16:9": "16/9", "9:16": "9/16", "4:3": "4/3", "3:4": "3/4" };
                this.ui.generatedImage.style.aspectRatio = arMap[this.currentAR] || "1/1";
                
                if (this.currentAR === "16:9" || this.currentAR === "4:3") {
                    this.ui.generatedImage.style.width = "100%";
                    this.ui.generatedImage.style.height = "auto";
                } else if (this.currentAR === "9:16" || this.currentAR === "3:4") {
                    this.ui.generatedImage.style.width = "auto";
                    this.ui.generatedImage.style.height = "100%";
                } else {
                    this.ui.generatedImage.style.width = "100%";
                    this.ui.generatedImage.style.height = "auto"; 
                }

                this.startLoadingSimulation();
                
                try {
                    const url = await this.api.generate({ prompt, style: this.currentStyle, ar: this.currentAR });
                    await this.preloadImage(url); 
                    this.finishGeneration(url, prompt);
                } catch (error) {
                    this.toast.show('error', 'Generation Failed', error.message || 'Something went wrong. Please try again.');
                    this.resetLoadingUI(); 
                    if (!this.currentImageUrl) this.ui.emptyState.style.display = 'flex';
                }
            }

            startLoadingSimulation() {
                this.ui.loadingOverlay.classList.add('active'); let progress = 0;
                this.progressInterval = setInterval(() => { const remaining = 99 - progress; progress += remaining * 0.05; if (progress > 99) progress = 99; this.ui.progressBar.style.width = `${progress}%`; this.ui.progressPercent.textContent = `${Math.floor(progress)}%`; }, 100);
                let msgIdx = 0; this.msgInterval = setInterval(() => { msgIdx = (msgIdx + 1) % LOADING_MESSAGES.length; this.ui.loadingMsg.textContent = LOADING_MESSAGES[msgIdx]; }, 2000);
            }

            stopLoadingSimulation() {
                clearInterval(this.progressInterval); clearInterval(this.msgInterval); this.ui.progressBar.style.width = `100%`; this.ui.progressPercent.textContent = `100%`;
                setTimeout(() => { this.ui.loadingOverlay.classList.remove('active'); setTimeout(() => { this.ui.progressBar.style.width = `0%`; this.ui.progressPercent.textContent = `0%`; this.ui.loadingMsg.textContent = LOADING_MESSAGES[0]; }, 300); }, 500);
            }

            resetLoadingUI() { this.stopLoadingSimulation(); this.isGenerating = false; this.ui.btnGenerate.disabled = false; this.ui.btnGenerate.innerHTML = `<svg viewBox="0 0 24 24" style="stroke: #fff !important;"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg> Generate Image`; }

            preloadImage(url) { return new Promise((resolve, reject) => { const img = new Image(); img.onload = () => resolve(); img.onerror = () => reject(new Error("Failed to load image.")); img.src = url; }); }

            finishGeneration(url, prompt) {
                this.currentImageUrl = url; this.ui.generatedImage.src = url; this.ui.generatedImage.style.display = 'block'; this.ui.imageTools.classList.add('active');
                this.resetLoadingUI(); this.toast.show('success', 'Creation Complete', 'Your masterpiece is ready!');
                this.storage.addItem(prompt, this.currentStyle, this.currentAR, url); this.renderHistory();
            }

            renderHistory() {
                const groups = this.storage.getGroupedHistory(); this.ui.historyContainer.innerHTML = ''; let hasHistory = false;
                const renderGroup = (title, items) => {
                    if (items.length === 0) return; hasHistory = true;
                    const groupTitle = document.createElement('div'); groupTitle.className = 'history-group-title'; groupTitle.textContent = title;
                    const list = document.createElement('div'); list.className = 'history-list';
                    items.forEach(item => {
                        const el = document.createElement('div'); el.className = 'history-item';
                        el.innerHTML = `<img src="${item.url}" class="history-thumb" alt="thumb" loading="lazy"><div class="history-info"><div class="history-prompt">${item.prompt}</div><div class="history-meta"><span>${STYLES.find(s => s.id === item.style)?.name || item.style}</span><span>${item.ar}</span></div></div>`;
                        el.addEventListener('click', () => {
                            this.restoreHistoryItem(item);
                            if (window.innerWidth < 900) {
                                this.ui.sidebar.classList.remove('active');
                            }
                        }); 
                        list.appendChild(el);
                    });
                    this.ui.historyContainer.appendChild(groupTitle); this.ui.historyContainer.appendChild(list);
                };
                renderGroup('Today', groups.today); renderGroup('Yesterday', groups.yesterday); renderGroup('Older', groups.older);
                if (!hasHistory) { this.ui.historyContainer.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-size: 0.85rem;"><svg viewBox="0 0 24 24" style="width:32px; height:32px; opacity: 0.5; margin-bottom: 12px;"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg><br>No history yet.</div>`; this.ui.btnClearHistory.style.display = 'none'; } else { this.ui.btnClearHistory.style.display = 'flex'; }
            }

            restoreHistoryItem(item) {
                this.ui.promptInput.value = item.prompt; this.ui.promptInput.dispatchEvent(new Event('input'));
                this.currentStyle = item.style; this.renderStyleSelector(); this.currentAR = item.ar; this.renderARSelector();
                this.currentImageUrl = item.url; this.ui.emptyState.style.display = 'none'; this.ui.generatedImage.src = item.url; this.ui.generatedImage.style.display = 'block'; this.ui.imageTools.classList.add('active');
                
                const arMap = { "1:1": "1/1", "16:9": "16/9", "9:16": "9/16", "4:3": "4/3", "3:4": "3/4" };
                this.ui.generatedImage.style.aspectRatio = arMap[item.ar] || "1/1";
                if (item.ar === "16:9" || item.ar === "4:3") { this.ui.generatedImage.style.width = "100%"; this.ui.generatedImage.style.height = "auto"; } 
                else if (item.ar === "9:16" || item.ar === "3:4") { this.ui.generatedImage.style.width = "auto"; this.ui.generatedImage.style.height = "100%"; } 
                else { this.ui.generatedImage.style.width = "100%"; this.ui.generatedImage.style.height = "auto"; }

                this.applyCSSFilter('none'); this.ui.filterSelect.value = 'none';
                document.getElementById('tab-artboard').style.display = 'flex'; this.switchMobileView('artboard-panel');
                this.toast.show('info', 'Restored', 'Workspace updated from history.');
            }

            clearHistory() { this.storage.clear(); this.renderHistory(); this.toast.show('success', 'Cleared', 'History has been permanently deleted.'); }

            /**
             * CORE CANVAS PROCESSOR
             * Processes image for BOTH Downloading and Expanding (Lightbox)
             */
            async getProcessedImageURL() {
                if (!this.currentImageUrl) return null; 
                
                const filter = this.ui.filterSelect.value;
                const ar = this.currentAR;
                
                try {
                    const img = new Image(); 
                    img.crossOrigin = 'Anonymous'; 
                    img.src = this.currentImageUrl;
                    
                    await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; });
                    
                    let targetRatio = 1;
                    if (ar === "16:9") targetRatio = 16/9;
                    if (ar === "9:16") targetRatio = 9/16;
                    if (ar === "4:3") targetRatio = 4/3;
                    if (ar === "3:4") targetRatio = 3/4;

                    let sourceX = 0, sourceY = 0;
                    let sourceWidth = img.width;
                    let sourceHeight = img.height;
                    const imgRatio = img.width / img.height;

                    if (imgRatio > targetRatio) {
                        sourceWidth = img.height * targetRatio;
                        sourceX = (img.width - sourceWidth) / 2;
                    } else if (imgRatio < targetRatio) {
                        sourceHeight = img.width / targetRatio;
                        sourceY = (img.height - sourceHeight) / 2;
                    }

                    const canvas = document.createElement('canvas'); 
                    canvas.width = sourceWidth; 
                    canvas.height = sourceHeight;
                    const ctx = canvas.getContext('2d'); 
                    
                    if (filter !== 'none') ctx.filter = this.getFilterString(filter);
                    
                    ctx.drawImage(img, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, sourceWidth, sourceHeight); 
                    return canvas.toDataURL('image/png');

                } catch (e) {
                    console.warn('Canvas processing failed, returning raw URL', e);
                    return this.currentImageUrl;
                }
            }

            async downloadGeneratedImage() {
                const url = await this.getProcessedImageURL();
                if (!url) return;
                
                const link = document.createElement('a'); 
                link.href = url; 
                link.download = `GenStudio_${Date.now()}.${url.startsWith('data:') ? 'png' : 'jpg'}`; 
                
                if(!url.startsWith('data:')) {
                    link.target = '_blank';
                    this.toast.show('warning', 'Filter/Crop Ignored', 'Saving original image due to browser security restrictions.');
                } else {
                    this.toast.show('success', 'Downloaded', 'Image saved with perfect aspect ratio.');
                }

                document.body.appendChild(link); link.click(); document.body.removeChild(link);
            }

            getFilterString(filterType) { switch(filterType) { case 'grayscale': return 'grayscale(100%)'; case 'sepia': return 'sepia(100%)'; case 'contrast': return 'contrast(150%)'; case 'brightness': return 'brightness(120%)'; default: return 'none'; } }
            applyCSSFilter(filterType) { this.ui.generatedImage.style.filter = this.getFilterString(filterType); }
        }

        document.addEventListener('DOMContentLoaded', () => { window.GenStudioApp = new App(); });
    </script>
</body>
